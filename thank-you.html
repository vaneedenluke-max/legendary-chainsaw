<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Canterbury Concierge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F4EFE6;--charcoal:#1C1C1C;--gold:#B49A6A;--stone:#7A7060;--deep:#0E0E0E;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--charcoal);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
  .logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;letter-spacing:0.18em;color:var(--stone);margin-bottom:60px;}
  .logo span{color:var(--gold);}
  .tick{font-size:3rem;margin-bottom:32px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,4rem);font-weight:300;line-height:1.1;margin-bottom:24px;}
  h1 em{font-style:italic;color:var(--gold);}
  p{font-size:0.95rem;line-height:1.85;color:#9A9080;max-width:480px;margin-bottom:48px;}
  a{font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;color:var(--charcoal);background:var(--gold);padding:16px 36px;display:inline-block;transition:background 0.3s;font-weight:500;}
  a:hover{background:#D4BC8E;}
</style>
</head>
<body>
  <div class="logo">Canterbury<span> Concierge</span></div>
  <div class="tick">✓</div>
  <h1>Your enquiry has<br>been <em>received</em></h1>
  <p>Thank you for reaching out. A member of our team will be in touch within 24 hours to discuss your request. We look forward to creating something exceptional for you.</p>
  <a href="index.html">Return to Home</a>
</body>
</html>
